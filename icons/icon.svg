<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#6366f1"/>
  <!-- Syringe body -->
  <rect x="180" y="140" width="60" height="200" rx="10" fill="white" opacity="0.95"/>
  <!-- Syringe plunger -->
  <rect x="200" y="120" width="20" height="30" rx="4" fill="white" opacity="0.7"/>
  <!-- Syringe tip -->
  <rect x="200" y="340" width="20" height="50" rx="4" fill="white" opacity="0.9"/>
  <!-- Measurement lines -->
  <rect x="180" y="190" width="20" height="4" rx="2" fill="#6366f1" opacity="0.6"/>
  <rect x="180" y="220" width="20" height="4" rx="2" fill="#6366f1" opacity="0.6"/>
  <rect x="180" y="250" width="20" height="4" rx="2" fill="#6366f1" opacity="0.6"/>
  <rect x="180" y="280" width="20" height="4" rx="2" fill="#6366f1" opacity="0.6"/>
  <!-- Loop arc -->
  <path d="M 290 200 Q 370 200 370 280 Q 370 360 290 360" stroke="white" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Loop arrow -->
  <polygon points="275,340 295,360 275,380" fill="white" opacity="0.9"/>
</svg>
